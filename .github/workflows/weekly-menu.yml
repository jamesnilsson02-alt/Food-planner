name: Weekly Menu Generator

on:
  schedule:
    # Måndag 07:00 UTC = 08:00/09:00 svensk tid (beroende på sommartid)
    - cron: "0 7 * * 1"
  workflow_dispatch: # Möjliggör manuell körning

jobs:
  generate-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Behövs för att pusha current_menu.json till docs/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch & generate weekly menu
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python faladen-bulk-bot/scripts/generate_menu.py

      - name: Commit and push current_menu.json
        run: |
          git config user.name "Bulk Bot"
          git config user.email "bulk-bot@github-actions"
          git add faladen-bulk-bot/docs/current_menu.json
          git diff --staged --quiet || git commit -m "🍗 Veckans matsedel $(date +'%Y-%m-%d')"
          git push
